---
layout: default
---

<article class="post">
  <div class="post-frame">
    <header class="post-header">
      <p class="post-kicker">デイリー号</p>
      <h1>{{ page.title | remove_first: "📅 " }}</h1>
      <p class="post-date">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      </p>
    </header>
    <div class="post-body">
      {{ content }}
    </div>
  </div>
</article>
